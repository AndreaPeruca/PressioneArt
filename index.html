<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flow" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>Flow — Monitoraggio Pressione Arteriosa</title>

    <!--
      Content Security Policy
      ─────────────────────────────────────────────────────────────────────────
      Restricts what the browser will execute/load for this origin.
      Key choices:
        script-src 'self' blob:   – no inline scripts; blob: needed for
                                    @react-pdf/renderer Web Worker
        style-src  'self' 'unsafe-inline' – Tailwind injects a style block
                                    in both dev and production builds
        img-src    data: blob:    – avatars / chart images may be data URIs
        font-src   data:          – react-pdf embeds fonts as data URIs
        worker-src blob:          – react-pdf PDF generation worker
        frame-ancestors 'none'   – blocks clickjacking via <iframe> embed
        object-src 'none'         – disables Flash / Java plugins
        base-uri   'self'         – prevents base-tag injection
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' blob: 'wasm-unsafe-eval' 'unsafe-eval';
        style-src   'self' 'unsafe-inline';
        img-src     'self' data: blob:;
        font-src    'self' data:;
        connect-src 'self';
        worker-src  'self' blob:;
        object-src  'none';
        frame-ancestors 'none';
        base-uri    'self';
        form-action 'self';
      "
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="no-referrer" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
